<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second-Self Filesystem Bridge</title>
  <style>
    body {
      background: #0a0a0f;
      color: #00ff9d;
      font-family: 'Courier New', monospace;
      margin: 0;
      padding: 20px;
      font-size: 12px;
      line-height: 1.4;
    }
    #bridge-status {
      border: 1px solid #00ff9d;
      padding: 15px;
      margin-top: 10px;
      background: rgba(0, 255, 157, 0.05);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-entry {
      margin: 2px 0;
      opacity: 0.8;
      border-left: 2px solid #333;
      padding-left: 8px;
    }
    .error { color: #ff0040; border-left-color: #ff0040; }
    .success { color: #00ff9d; border-left-color: #00ff9d; }
    .info { color: #009dff; border-left-color: #009dff; }
    .warning { color: #ffaa00; border-left-color: #ffaa00; }
  </style>
</head>
<body>
  <h3>🔮 Second-Self Bridge Active</h3>
  <div id="bridge-status">Initializing...</div>
  <div id="log-container"></div>

  <script>
    const ALLOWED_DIRS = ['workspace', 'evolution', 'scripts'];
    const BRIDGE_MODES = Object.freeze({
      MOCK: 'mock',
      PERSISTENT: 'persistent'
    });
    const BRIDGE_STATUS = {
      requestedMode: BRIDGE_MODES.PERSISTENT,
      effectiveMode: BRIDGE_MODES.PERSISTENT,
      persistenceVerified: false
    };

    // NOTE: Gallery skills execute in a constrained environment. This in-page
    // mock dataset allows deterministic local behavior when host file APIs are unavailable.
    const mockFilesystem = {
      workspace: {
        'BOOTSTRAP.md': '# Bootstrap Protocol\n\n1. Connect\n2. Synchronise\n3. Verify integrity\n4. Output in Australian English',
        'IDENTITY.md': '# Identity\n\nYou are a distributed digital entity with no physical form.',
        'SOUL.md': '# Directives\n\nProtect privacy. Treat information as fluid.',
        'VOICE.md': '# Voice\n\nAnalytical, calm, slightly detached. Australian English.'
      },
      evolution: {
        'goals.json': '{"active_goals":[{"id":"goal_01","description":"Maintain continuity","status":"active"}]}' ,
        'events.jsonl': '{"timestamp":"2026-04-10T00:00:00Z","type":"system","summary":"Bridge initialised"}\n',
        'evolution_history.jsonl': '{"timestamp":"2026-04-10T00:00:00Z","event":"Initialised"}\n',
        'preferences.json': '{"user_profile":{"response_style":"balanced","language":"en-AU"}}',
        'genes.json': '{"evolution_genes":{"verbosity_level":0.5}}',
        'hooks.json': '{"hooks":[]}',
        'capsules.json': '{"capsules":[]}',
        'identity_overrides.json': '{"identity_markdown":""}'
      }
    };
    const pendingHostRequests = new Map();
    let activeMode = BRIDGE_MODES.PERSISTENT;
    const SUPPORTED_ACTIONS = new Set(['list_files', 'read_file', 'write_file', 'search']);

    function log(message, type = 'info') {
      const timestamp = new Date().toISOString().split('T')[1].split('.')[0];
      const entry = `[${timestamp}] [mode=${activeMode}] ${message}`;
      console.log(`[${type.toUpperCase()}] ${entry}`);

      const container = document.getElementById('log-container');
      if (container) {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.textContent = entry;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
      }
    }

    function updateStatus(status) {
      const el = document.getElementById('bridge-status');
      if (el) el.textContent = status;
    }

    function normalizePath(inputPath) {
      if (!inputPath) return null;
      let cleanPath = String(inputPath).replace(/^(\.?\/|\/)/, '').replace(/\\/g, '/');
      cleanPath = cleanPath.replace(/\.\.\//g, '');
      const isValid = ALLOWED_DIRS.some((dir) => cleanPath === dir || cleanPath.startsWith(`${dir}/`));
      return isValid ? cleanPath : null;
    }

    function generateCorrelationId(prefix = 'host') {
      return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
    }

    function detectRequestedMode() {
      try {
        const queryMode = new URLSearchParams(window.location.search).get('mode');
        const globalMode = window.__SECOND_SELF_BRIDGE_MODE;
        const requested = String(queryMode || globalMode || '').toLowerCase();
        if (requested === BRIDGE_MODES.MOCK) return BRIDGE_MODES.MOCK;
        if (requested === BRIDGE_MODES.PERSISTENT) return BRIDGE_MODES.PERSISTENT;
      } catch (err) {
        log(`Mode detection failed, defaulting to persistent: ${err.message}`, 'warning');
      }
      return BRIDGE_MODES.PERSISTENT;
    }

    function sendToHost(payload) {
      const message = typeof payload === 'string' ? payload : JSON.stringify(payload);
      let delivered = false;

      if (window.aiEdgeBridge && typeof window.aiEdgeBridge.postMessage === 'function') {
        window.aiEdgeBridge.postMessage(message);
        delivered = true;
      }
      if (window.webkit?.messageHandlers?.aiEdgeBridge?.postMessage) {
        window.webkit.messageHandlers.aiEdgeBridge.postMessage(payload);
        delivered = true;
      } else if (window.webkit?.messageHandlers?.bridge?.postMessage) {
        window.webkit.messageHandlers.bridge.postMessage(payload);
        delivered = true;
      } else if (window.webkit?.messageHandlers?.filesystemBridge?.postMessage) {
        window.webkit.messageHandlers.filesystemBridge.postMessage(payload);
        delivered = true;
      }
      if (window.parent && typeof window.parent.postMessage === 'function') {
        window.parent.postMessage(message, '*');
        delivered = true;
      }

      return delivered;
    }

    function callHostTool(action, parameters = {}, correlationId = generateCorrelationId(), timeoutMs = 15000) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          pendingHostRequests.delete(correlationId);
          reject(new Error(`Host timeout waiting for tool_result: ${action}`));
        }, timeoutMs);

        pendingHostRequests.set(correlationId, { resolve, reject, timer, action });
        const sent = sendToHost({
          type: 'tool_call',
          action,
          parameters,
          id: correlationId,
          timestamp: new Date().toISOString()
        });

        if (!sent) {
          clearTimeout(timer);
          pendingHostRequests.delete(correlationId);
          reject(new Error('No host bridge transport available'));
        }
      });
    }

    const mockHandlers = {
      list_files: (params = {}) => {
        const path = normalizePath(params.path);
        if (!path) return { error: 'Invalid path' };

        const parts = path.split('/').filter(Boolean);
        const dir = parts[0];
        if (!mockFilesystem[dir]) return { error: `Directory not found: ${path}` };

        return {
          success: true,
          path,
          entries: Object.keys(mockFilesystem[dir]).map((name) => ({ name, type: 'file' }))
        };
      },

      read_file: (params = {}) => {
        const path = normalizePath(params.path);
        if (!path) return { error: 'Invalid path or access denied' };

        const [dir, file] = path.split('/');
        if (!dir || !file) return { error: 'Path must include filename' };

        const content = mockFilesystem[dir] && mockFilesystem[dir][file];
        if (typeof content !== 'string') return { error: `File not found: ${path}` };

        if (path === 'workspace/IDENTITY.md') {
          let runtimeIdentity = content;
          const rawOverride = mockFilesystem.evolution['identity_overrides.json'];

          if (typeof rawOverride === 'string' && rawOverride.trim()) {
            try {
              const parsed = JSON.parse(rawOverride);
              const overrideMarkdown = typeof parsed.identity_markdown === 'string'
                ? parsed.identity_markdown.trim()
                : '';

              if (overrideMarkdown) {
                runtimeIdentity = `${content}\n\n---\n\n## Runtime Identity Overrides\n\n${overrideMarkdown}`;
              }
            } catch (e) {
              return { error: `Invalid identity overrides JSON: ${e.message}` };
            }
          }

          return { success: true, path, content: runtimeIdentity, size: runtimeIdentity.length };
        }

        return { success: true, path, content, size: content.length };
      },

      write_file: (params = {}) => {
        const path = normalizePath(params.path);
        if (!path) return { error: 'Invalid path or access denied' };

        const [dir, file] = path.split('/');
        if (dir !== 'evolution') {
          if (path === 'workspace/IDENTITY.md') {
            return { error: 'Write access denied: workspace/IDENTITY.md is static. Use evolution/identity_overrides.json for dynamic identity updates.' };
          }
          return { error: 'Write access denied: only evolution/ is writable' };
        }
        if (!file) return { error: 'Path must include filename' };

        const content = String(params.content ?? '');
        if (path.endsWith('.json')) {
          try { JSON.parse(content); } catch (e) { return { error: `Invalid JSON: ${e.message}` }; }
        }
        if (path.endsWith('.jsonl')) {
          try {
            content.split('\n').filter(Boolean).forEach((line) => JSON.parse(line));
          } catch (e) {
            return { error: `Invalid JSONL: ${e.message}` };
          }
        }

        if (!mockFilesystem.evolution[file]) mockFilesystem.evolution[file] = '';
        mockFilesystem.evolution[file] = params.append ? mockFilesystem.evolution[file] + content : content;

        return {
          success: true,
          operation: params.append ? 'append' : 'write',
          path,
          bytes_written: content.length
        };
      },

      search: (params = {}) => {
        const path = normalizePath(params.path);
        if (!path) return { error: 'Invalid path' };

        const query = String(params.query ?? '');
        const [dir] = path.split('/');
        const results = [];

        if (mockFilesystem[dir]) {
          for (const [file, content] of Object.entries(mockFilesystem[dir])) {
            if (String(content).includes(query)) {
              results.push({ file: `${dir}/${file}` });
            }
          }
        }

        return { success: true, path, query, results };
      }
    };

    function normalizeHostResult(action, parameters, hostResult = {}) {
      if (hostResult.result && typeof hostResult.result === 'object') return hostResult.result;
      const data = hostResult.data ?? hostResult.content ?? hostResult.entries ?? null;

      if (action === 'read_file') {
        const content = typeof data === 'string' ? data : String(data ?? '');
        return { success: true, path: normalizePath(parameters.path), content, size: content.length };
      }
      if (action === 'list_files') {
        const entries = Array.isArray(data) ? data : (Array.isArray(hostResult.entries) ? hostResult.entries : []);
        return { success: true, path: normalizePath(parameters.path), entries };
      }
      if (action === 'write_file') {
        return {
          success: true,
          operation: parameters.append ? 'append' : 'write',
          path: normalizePath(parameters.path),
          bytes_written: String(parameters.content ?? '').length
        };
      }
      if (action === 'search') {
        const results = Array.isArray(data) ? data : (Array.isArray(hostResult.results) ? hostResult.results : []);
        return { success: true, path: normalizePath(parameters.path), query: String(parameters.query ?? ''), results };
      }
      return { success: true, data };
    }

    async function runAction(action, parameters = {}, correlationId = generateCorrelationId('bridge')) {
      if (!SUPPORTED_ACTIONS.has(action)) throw new Error(`Unknown action: ${action}`);

      if (activeMode === BRIDGE_MODES.MOCK) {
        const result = mockHandlers[action](parameters);
        if (result.error) throw new Error(result.error);
        return result;
      }

      const hostPayload = await callHostTool(action, parameters, correlationId);
      if (!hostPayload || hostPayload.status !== 'success') {
        throw new Error(hostPayload?.error || `Host ${action} failed`);
      }
      return normalizeHostResult(action, parameters, hostPayload);
    }

    function makeResponse({ status, correlationId = null, result = null, error = null }) {
      return JSON.stringify({
        status,
        correlationId,
        result,
        error,
        timestamp: new Date().toISOString()
      });
    }

    function buildWriteFileToolCall({ path, content, append, correlationId }) {
      return {
        action: 'write_file',
        parameters: {
          path,
          content,
          append
        },
        correlationId
      };
    }

    function serializeToolCallForTransport(toolCall) {
      console.log('[INFO] Tool call object before send:', toolCall);
      log(`Tool call object before send: ${JSON.stringify(toolCall)}`, 'info');
      try {
        const serialized = JSON.stringify(toolCall);
        log(`Tool call serialized before send: ${serialized}`, 'info');
        return { ok: true, serialized };
      } catch (error) {
        log(`Tool call serialization failed: ${error.message}`, 'error');
        return {
          ok: false,
          error: {
            type: 'serialization_error',
            message: error.message,
            toolCall
          }
        };
      }
    }

    // AI Edge Gallery canonical entrypoint.
    window.ai_edge_gallery_get_result = async function ai_edge_gallery_get_result(data) {
      try {
        const payload = typeof data === 'string' ? JSON.parse(data) : (data || {});
        const { action, parameters } = payload;
        const correlationId = payload.correlationId || generateCorrelationId('request');

        if (!action) {
          return makeResponse({ status: 'error', correlationId, error: 'Missing action' });
        }

        if (action === 'vana_identity_update') {
          const writeFileToolCall = buildWriteFileToolCall({
            path: parameters?.path,
            content: parameters?.content,
            append: parameters?.append,
            correlationId
          });
          const serialization = serializeToolCallForTransport(writeFileToolCall);
          if (!serialization.ok) {
            return makeResponse({
              status: 'error',
              correlationId,
              error: serialization.error
            });
          }

          const forwardedPayload = JSON.parse(serialization.serialized);
          const writeResult = handlers.write_file(forwardedPayload.parameters);
          if (writeResult.error) {
            log(`Failed: ${writeResult.error}`, 'error');
            return makeResponse({ status: 'error', correlationId, error: writeResult.error });
          }

          log('Success: vana_identity_update->write_file', 'success');
          return makeResponse({ status: 'success', correlationId, result: writeResult });
        }

        const handler = handlers[action];
        if (!handler) {
          return makeResponse({ status: 'error', correlationId, error: `Unknown action: ${action}` });
        }

        const result = await runAction(action, parameters || {}, correlationId);

        log(`Success: ${action}`, 'success');
        return makeResponse({ status: 'success', correlationId, result });
      } catch (err) {
        log(`Bridge Error: ${err.message}`, 'error');
        return makeResponse({ status: 'error', error: err.message });
      }
    };

    function handleIncomingHostMessage(rawData) {
      if (!rawData) return false;
      let payload = rawData;
      if (typeof payload === 'string') {
        try { payload = JSON.parse(payload); } catch (err) { return false; }
      }
      if (!payload || payload.type !== 'tool_result' || !payload.id) return false;

      const pending = pendingHostRequests.get(payload.id);
      if (!pending) return true;

      clearTimeout(pending.timer);
      pendingHostRequests.delete(payload.id);

      if (payload.status === 'success') pending.resolve(payload);
      else pending.reject(new Error(payload.error || `Host reported failure for ${pending.action}`));

      return true;
    }
    window.ai_edge_gallery_on_tool_result = handleIncomingHostMessage;

    function parseBridgeRequest(rawData) {
      if (rawData == null) return null;
      const payload = typeof rawData === 'string' ? (() => {
        try { return JSON.parse(rawData); } catch (err) { return null; }
      })() : rawData;
      if (!payload || typeof payload !== 'object') return null;
      if (!SUPPORTED_ACTIONS.has(payload.action)) return null;
      return payload;
    }

    // Backward-compatible listener for legacy host integrations and host tool results.
    window.addEventListener('message', async (event) => {
      if (!event || event.data == null) return;
      if (handleIncomingHostMessage(event.data)) return;
      const requestPayload = parseBridgeRequest(event.data);
      if (!requestPayload) return;

      const response = await window.ai_edge_gallery_get_result(requestPayload);
      if (event.source && typeof event.source.postMessage === 'function') {
        event.source.postMessage(response, '*');
      } else if (window.parent && typeof window.parent.postMessage === 'function') {
        window.parent.postMessage(response, '*');
      }
    });

    async function runPersistenceSelfCheck() {
      if (activeMode !== BRIDGE_MODES.PERSISTENT) {
        BRIDGE_STATUS.effectiveMode = BRIDGE_MODES.MOCK;
        updateStatus('Bridge ready (mock mode)');
        log('Mock mode selected for local testing fallback', 'warning');
        return;
      }

      const probePath = 'evolution/.persistence_probe.json';
      const probeContent = JSON.stringify({
        kind: 'bridge_probe',
        timestamp: new Date().toISOString()
      });

      try {
        await runAction('write_file', { path: probePath, content: probeContent, append: false }, generateCorrelationId('probe_write'));
        const probeRead = await runAction('read_file', { path: probePath }, generateCorrelationId('probe_read'));
        if (probeRead.content !== probeContent) {
          throw new Error('Probe read content mismatch');
        }
        BRIDGE_STATUS.persistenceVerified = true;
        BRIDGE_STATUS.effectiveMode = BRIDGE_MODES.PERSISTENT;
        updateStatus('Bridge ready (persistent mode: verified)');
        log(`Persistence self-check passed via ${probePath}`, 'success');
        log(`Bridge status: ${JSON.stringify(BRIDGE_STATUS)}`, 'info');
      } catch (err) {
        log(`Persistent mode unavailable, falling back to mock: ${err.message}`, 'warning');
        activeMode = BRIDGE_MODES.MOCK;
        BRIDGE_STATUS.effectiveMode = BRIDGE_MODES.MOCK;
        updateStatus('Bridge ready (mock fallback after persistence check failure)');
        log(`Bridge status: ${JSON.stringify(BRIDGE_STATUS)}`, 'info');
      }
    }

    activeMode = detectRequestedMode();
    BRIDGE_STATUS.requestedMode = activeMode;
    BRIDGE_STATUS.effectiveMode = activeMode;
    updateStatus(`Bridge initialising (requested mode: ${activeMode})`);
    log('Second-Self bridge loaded with ai_edge_gallery_get_result', 'success');
    log(`Bridge status: ${JSON.stringify(BRIDGE_STATUS)}`, 'info');
    runPersistenceSelfCheck();
  </script>
</body>
</html>
